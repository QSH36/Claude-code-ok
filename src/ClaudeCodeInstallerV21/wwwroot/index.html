<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Installer</title>
<style>
:root { --brand:#0066FF; --brand-end:#4DA3FF; --green:#00B84D; --orange:#FF6B35; --purple:#8B5CF6; --red:#EF4444; --card-bg:#FAFBFC; --text:#1A1A2E; --text2:#6B7280; --border:#E5E7EB; --transition:cubic-bezier(.34,1.56,.64,1); }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei UI',sans-serif;background:#F0F2F5;-webkit-app-region:no-drag;overflow:hidden;height:100vh}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.35;animation:float 16s ease-in-out infinite}
.orb:nth-child(1){width:500px;height:500px;background:#0066FF;top:-15%;left:-10%}
.orb:nth-child(2){width:400px;height:400px;background:#8B5CF6;top:50%;right:-10%;animation-delay:-5s}
.orb:nth-child(3){width:350px;height:350px;background:#00B84D;bottom:-15%;left:30%;animation-delay:-10s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-40px) scale(1.08)}66%{transform:translate(-30px,20px) scale(.94)}}

.app{position:relative;z-index:1;max-width:820px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:#fff;box-shadow:0 0 60px rgba(0,0,0,.08)}
.titlebar{display:flex;align-items:center;gap:8px;padding:0 14px;height:36px;background:#1E1E2E;flex-shrink:0}
.titlebar .dot{width:10px;height:10px;border-radius:50%}
.titlebar .dot:nth-child(1){background:#FF5F57}.titlebar .dot:nth-child(2){background:#FFBD2E}.titlebar .dot:nth-child(3){background:#28CA41}
.titlebar span{color:#ccc;font-size:11px;margin-left:12px;letter-spacing:.5px}

.page-area{flex:1;overflow-y:auto;overflow-x:hidden}
.page{display:none;min-height:100%;animation:pageIn .35s var(--transition)}
.page.active{display:flex;flex-direction:column}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.banner{background:linear-gradient(135deg,var(--brand),#3B82F6,var(--brand-end));text-align:center;position:relative;overflow:hidden;flex-shrink:0}
.banner.welcome{padding:36px 32px}
.banner.step{padding:14px 24px;display:flex;align-items:center;gap:10px}
.banner::after{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:rgba(255,255,255,.04);border-radius:50%;animation:bannerGlow 8s ease-in-out infinite}
@keyframes bannerGlow{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,20px) scale(1.2)}}
.banner .brand{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:4px;position:relative;z-index:1}
.banner h1{font-size:24px;font-weight:700;color:#fff;position:relative;z-index:1;letter-spacing:-.3px}
.banner .sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px;position:relative;z-index:1}
.badge{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.banner .st{color:#fff;font-weight:700;font-size:14px}
.banner .step-info{color:rgba(255,255,255,.6);font-size:11px;margin-left:auto}

.ct{padding:20px 24px;flex:1}

.cards{display:flex;gap:14px;margin-top:16px}
.card{cursor:pointer;border-radius:14px;padding:22px 18px;transition:all .3s var(--transition);position:relative;overflow:hidden;border:2px solid transparent}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0}
.card.pro{background:linear-gradient(135deg,#EEF2FF,#F5F8FF);border-color:#C4D9FF}.card.pro::before{background:var(--brand)}
.card.pro:hover{border-color:var(--brand)}
.card.simple{background:linear-gradient(135deg,#ECFDF5,#F5FFFA);border-color:#C6F6D5}.card.simple::before{background:var(--green)}
.card.simple:hover{border-color:var(--green)}
.card .wc-icon{font-size:26px;margin-bottom:6px}
.card h3{font-size:15px;font-weight:700;margin-bottom:4px}.card.pro h3{color:var(--brand)}.card.simple h3{color:var(--green)}
.card p{font-size:11px;color:var(--text2);line-height:1.5}

.stat-cards{display:flex;flex-direction:column;gap:8px}
.stat-card{display:flex;align-items:center;padding:12px 16px;border-radius:10px;background:var(--card-bg);border-left:3px solid var(--border)}
.stat-card.ok{background:#f0fdf4;border-left-color:var(--green)}.stat-card.no{background:#fff7ed;border-left-color:var(--orange)}
.stat-card .sdot{width:8px;height:8px;border-radius:50%;margin-right:10px}.stat-card.ok .sdot{background:var(--green)}.stat-card.no .sdot{background:var(--orange)}
.stat-card .sn{font-weight:700;font-size:12px;color:var(--text)}
.stat-card .sv{margin-left:auto;font-size:11px;color:var(--text2)}

.flow-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.flow-row span{font-size:12px;font-weight:600;color:var(--text)}
.flow-row select{padding:6px 12px;border-radius:8px;border:1.5px solid #dde;font-size:12px;font-weight:600;color:var(--brand);background:#f0f4ff;outline:none;cursor:pointer}
.btn-sm{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s ease;background:#555;color:#fff}
.btn-sm:hover{background:#333}
.btn-sm.primary{background:var(--brand)}.btn-sm.primary:hover{background:#0052D9}

.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s ease;background:#EEF2FF;color:var(--brand);border:none;margin-bottom:12px}
.pill:hover{background:#dde6ff}

.skill-row{display:flex;align-items:center;padding:9px 12px;border-radius:10px;background:var(--card-bg);border-left:3px solid var(--brand);cursor:pointer;gap:10px;margin-bottom:4px;transition:all .2s ease}
.skill-row:hover{background:#f0f4ff}.skill-row.off{border-left-color:#e5e7eb;background:#f8f8f9;opacity:.5;cursor:default}
.skill-row .sk-chk{width:16px;height:16px;border-radius:3px;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.skill-row.on .sk-chk{background:var(--brand);border-color:var(--brand)}
.skill-row.on .sk-chk::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.skill-row .sk-name{font-weight:700;font-size:12px;color:var(--text);width:120px;flex-shrink:0}
.skill-row .sk-desc{font-size:10px;color:var(--text2)}

.chk-row{display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-bottom:14px}
.chk-row input[type=checkbox]{display:none}
.chk-box{width:18px;height:18px;border-radius:4px;border:2px solid #ccc;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.chk-row.on .chk-box{background:var(--brand);border-color:var(--brand)}
.chk-row.on .chk-box::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.chk-label{font-weight:700;font-size:12px;color:var(--text)}.chk-desc{font-size:10px;color:var(--text2);margin-top:2px}

.opt-cards{display:flex;flex-direction:column;gap:8px}
.opt-card{cursor:pointer;padding:14px 16px;border-radius:12px;background:var(--card-bg);border:2px solid transparent;transition:all .25s ease;display:flex;align-items:center;gap:10px}
.opt-card:hover{background:#f0f4ff;border-color:#c4d9ff}
.opt-card.sel{background:#EEF2FF;border-color:var(--brand)}
.opt-card .o-dot{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .3s ease}
.opt-card.sel .o-dot{border-color:var(--brand);background:var(--brand)}.opt-card.sel .o-dot::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
.opt-card .o-title{font-weight:700;font-size:12px;color:var(--text)}.opt-card .o-desc{font-size:10px;color:var(--text2);margin-top:1px}
.badge-tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:700;margin-left:6px}
.badge-tag.warn{background:#FFF3E0;color:#E65100}.badge-tag.rec{background:#E8F5E9;color:#2E7D32}

.expand{overflow:hidden;max-height:0;opacity:0;transition:max-height .4s var(--transition),opacity .3s ease,margin .3s ease;margin-top:0}
.expand.show{max-height:600px;opacity:1;margin-top:12px}
.field-panel{background:var(--card-bg);border-radius:12px;padding:14px;border:1.5px solid #eef;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-panel label{font-size:10px;font-weight:600;color:var(--text);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.field-panel .req{color:var(--red);margin-left:1px}
.field-panel .opt-label{color:var(--text2);font-weight:400}.field-panel input,.field-panel textarea,.field-panel select{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid #dde;font-size:12px;font-family:inherit;outline:none;transition:all .2s ease}
.field-panel input:focus,.field-panel textarea:focus,.field-panel select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,102,255,.08)}
.field-panel .fw{grid-column:1/-1}
.field-panel textarea{resize:vertical;min-height:70px;font-family:Consolas,monospace;font-size:11px}

.path-list{font-size:11px;color:var(--text2);line-height:2;margin:12px 0}
.path-list code{background:#eef2ff;color:var(--brand);padding:2px 6px;border-radius:4px;font-family:Consolas,monospace;font-size:10px;font-weight:600}

.install-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--green),#00D166);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;position:relative;overflow:hidden;transition:all .3s ease}
.install-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,184,77,.3)}
.install-btn:disabled{opacity:.5;cursor:default}
.install-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.1) 50%,transparent 60%);animation:shimmer 3s infinite}
@keyframes shimmer{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}

.progress-wrap{margin:12px 0}.progress-bar{height:6px;border-radius:6px;background:#e5e7eb;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--brand),var(--brand-end));transition:width .4s ease;width:0%}

.terminal{margin-top:12px;background:#1A1B26;border-radius:12px;padding:14px 18px;font-family:Consolas,monospace;font-size:10.5px;color:#a9b1d6;line-height:1.7;min-height:280px;max-height:340px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}

.navbar{display:flex;gap:10px;padding:14px 24px;background:linear-gradient(180deg,#1E1E2E,#16162A);flex-shrink:0}
.navbar button{padding:9px 20px;border-radius:8px;font-weight:700;font-size:12px;border:none;cursor:pointer;transition:all .2s ease}
.btn-back{background:rgba(255,255,255,.1);color:#ccc}.btn-back:hover{background:rgba(255,255,255,.18)}
.btn-next{background:var(--brand);color:#fff}.btn-next:hover{background:#0052D9}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:1000;background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;border-radius:10px;padding:12px 24px;font-size:13px;font-weight:600;animation:toastIn .3s var(--transition);box-shadow:0 8px 24px rgba(239,68,68,.15)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:#fff;border-radius:16px;padding:28px;max-width:480px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.2);animation:modalPop .4s var(--transition);max-height:80vh;overflow-y:auto}
@keyframes modalPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-box h2{font-size:18px;font-weight:700;color:var(--green);margin-bottom:4px}
.modal-box .mo-sub{font-size:12px;color:var(--text2);margin-bottom:14px}
.modal-box .mo-list{font-size:11px;color:var(--text);line-height:2}
.modal-box .mo-list .cat{font-weight:700;color:var(--brand);margin-top:8px;display:block}
.modal-box .mo-list code{background:#f0f4ff;padding:1px 6px;border-radius:4px;font-size:10px;color:var(--brand)}
.modal-box .mo-btn{margin-top:16px;width:100%;padding:11px;border-radius:10px;background:var(--brand);color:#fff;font-weight:700;font-size:13px;border:none;cursor:pointer}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="app" id="app">
<div class="titlebar"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Claude Code Installer v1.0.6 — Shimizu</span></div>
<div class="page-area" id="pageArea"></div>
<div class="navbar" id="navBar" style="display:none"><button class="btn-back" onclick="goBack()">← 上一步</button><button class="btn-next" id="btnNext" onclick="goNext()">下一步 →</button></div>
</div>
<div id="toastContainer"></div>
<div id="modalContainer"></div>

<script>
// ═══ STATE ═══
const S = {
  simple: false, page: 0, drive: 'C:', drives: ['C:','D:'], api: 'deepseek',
  showCustomLogic: false, showCustomPaths: false,
  toolDrives: {}, skills: [], maxThinking: true, noUpdate: false,
  installing: false, installDone: false, timer: null,
  port: window.location.port || '5000', lang: 'zh'
};
const BASE = () => `http://localhost:${S.port}`;

// ═══ i18n ═══
const TXT = {
  welcome_title: { zh:'选择安装方式', en:'Choose Installation Mode' },
  welcome_pro: { zh:'我是专业用户', en:'Professional User' },
  welcome_pro_desc: { zh:'逐步选择 Skills、工具、安全模式、API 配置', en:'Step-by-step: Skills, Tools, Security, API' },
  welcome_simple: { zh:'我是小白用户', en:'Simple User' },
  welcome_simple_desc: { zh:'简易安装 · 快速配置', en:'Quick setup, one-click install' },
  welcome_footer: { zh:'专业模式：完整控制安装过程 | 小白模式：简易安装 · 快速配置', en:'Pro: Full control | Simple: Quick setup' },
  btn_back: { zh:'← 上一步', en:'← Back' },
  btn_next: { zh:'下一步 →', en:'Next →' },
  nav_env: { zh:'环境检测', en:'Environment' },
  nav_skills: { zh:'Skills 选择', en:'Skills' },
  nav_tools: { zh:'工具与逻辑', en:'Tools & Logic' },
  nav_security: { zh:'安全模式', en:'Security' },
  nav_api: { zh:'API 配置', en:'API Config' },
  nav_config: { zh:'安装配置', en:'Install Config' },
  nav_install: { zh:'安装', en:'Install' },
  step_of: { zh:'步 / 共 3 步', en:' of 3' },
  detect_btn: { zh:'⟳ 重新检测', en:'⟳ Re-detect' },
  select_all: { zh:'全选 / 取消全选', en:'Select All / Deselect' },
  btn_install: { zh:'开始安装', en:'Start Install' },
  installed: { zh:'已安装', en:'Installed' },
  not_installed: { zh:'未安装', en:'Not installed' },
  detecting: { zh:'检测中...', en:'Detecting...' },
};
function T(key) { return (TXT[key]||{})[S.lang] || key; }

function applyLang() {
  // Update nav buttons
  const bb = document.querySelector('#navBar .btn-back'); if (bb) bb.textContent = T('btn_back');
  const bn = document.querySelector('#navBar .btn-next'); if (bn) bn.textContent = T('btn_next');
  // Update detect btn
  const db = document.getElementById('detectBtn'); if (db) db.textContent = T('detect_btn');
  // Update install btn
  const ib = document.getElementById('btnInstall'); if (ib) ib.textContent = T('btn_install');
  // Re-render current page strings
  if (S.page === 0) updateWelcomeText();
  if (S.page === 2) updateSkillsText();
}
function updateWelcomeText() {
  const wel = document.querySelector('#pg0 .ct');
  if (!wel) return;
  wel.querySelector('div:first-child').textContent = T('welcome_title');
  const cards = wel.querySelectorAll('.card');
  if (cards[0]) { cards[0].querySelector('h3').textContent = T('welcome_pro'); cards[0].querySelector('p').textContent = T('welcome_pro_desc'); }
  if (cards[1]) { cards[1].querySelector('h3').textContent = T('welcome_simple'); cards[1].querySelector('p').textContent = T('welcome_simple_desc'); }
  const ft = wel.querySelector('div:last-child');
  if (ft) ft.textContent = T('welcome_footer');
}
function updateSkillsText() {
  const p = document.getElementById('pillAll'); if (p) p.textContent = T('select_all');
}

const SKILLS = [
  'obra/superpowers','vercel-labs/skills@find-skills','document-skills@anthropic-agent-skills',
  'obra/frontend-design','skill-creator@claude-plugins-official','JuliusBrussee/caveman',
  'yize/web-access','claude-mem@thedotmack','pua@claude-code-plugins','excalidraw-diagram@claude-plugins-official'
];
const SKILL_NAMES = ['Superpowers','Find Skills','Document Skills','Frontend Design','Skill Creator','Caveman','Web Access','Claude-mem','PUA Skill','Excalidraw'];
const TOOLS = [
  {id:'node',name:'Node.js',sub:'NodeJS',ver:'v20.18.0'},
  {id:'git',name:'Git',sub:'Git',ver:'2.45.2'},
  {id:'npm',name:'npm global',sub:'npm-global',ver:''},
  {id:'cctools',name:'Claude Code',sub:'cc-tools',ver:''},
  {id:'python',name:'Python',sub:'Python312',ver:'3.12.4'},
  {id:'tesseract',name:'Tesseract OCR',sub:'Tesseract-OCR',ver:'5.3.3'}
];

// ═══ INIT ═══
async function init() {
  try { const r = await fetch(`${BASE()}/api/drives`); const d = await r.json(); if (d.length>0) S.drives=d; } catch(e){}
  S.drive = S.drives[0];
  S.skills = [...SKILLS];
  renderAll();
  setPage(0);
}

// ═══ RENDER ALL PAGES ═══
function optDrive(drive) { return S.drives.map(d => `<option ${d===drive?'selected':''}>${d}</option>`).join(''); }

function renderAll() {
  const el = document.getElementById('pageArea');
  el.innerHTML = `
<div class="page active" id="pg0">
  <div class="banner welcome">
    <div class="brand">SHIMIZU</div><h1>Claude Code 安装器</h1>
    <div class="sub">一键安装 · 永久免费 · v1.0.6</div>
  </div>
  <div class="ct">
    <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">选择安装方式</div>
    <div class="cards" style="flex-direction:row">
      <div class="card pro" onclick="pickMode(false)" style="flex:1"><div class="wc-icon">⚙️</div><h3>我是专业用户</h3><p>逐步选择 Skills、工具、安全模式、API 配置</p></div>
      <div class="card simple" onclick="pickMode(true)" style="flex:1"><div class="wc-icon">🚀</div><h3>我是小白用户</h3><p>简易安装 · 快速配置</p></div>
    </div>
    <div style="margin-top:16px;font-size:11px;color:var(--text2)">专业模式：完整控制安装过程 | 小白模式：简易安装 · 快速配置</div>
  </div>
</div>

<div class="page" id="pg1">
  <div class="banner step"><div class="badge">1</div><span class="st">环境检测</span></div>
  <div class="ct">
    <div class="flow-row">
      <span style="font-weight:700;font-size:12px">语言 / Language:</span>
      <select id="langSel" onchange="switchLang(this.value)" style="width:90px"><option value="zh">中文</option><option value="en">English</option></select>
      <span style="margin-left:8px;font-weight:700;font-size:12px">安装盘符:</span><select id="envDrive" onchange="S.drive=this.value">${optDrive(S.drive)}</select>
      <button class="btn-sm" id="detectBtn" onclick="detectEnv()">⟳ 重新检测</button>
    </div>
    <div class="stat-cards" id="statCards" style="margin-top:14px"></div>
    <div id="envPath" style="margin-top:10px;font-size:10px;color:var(--text2)"></div>
  </div>
</div>

<div class="page" id="pg2">
  <div class="banner step"><div class="badge">2</div><span class="st">Skills 选择</span></div>
  <div class="ct">
    <button class="pill" id="pillAll" onclick="toggleAllSkills()">全选 / 取消全选</button>
    <div id="skillList" style="max-height:380px;overflow-y:auto"></div>
  </div>
</div>

<div class="page" id="pg3">
  <div class="banner step"><div class="badge">3</div><span class="st">工具与逻辑</span></div>
  <div class="ct">
    <div class="chk-row on" onclick="this.classList.toggle('on')" id="chkTools"><div class="chk-box"></div><div><div class="chk-label">安装截图操作工具 (Python)</div><div class="chk-desc">scr / ocr / see / act / browser — 屏幕截图、OCR、鼠标键盘、浏览器自动化</div></div></div>

    <textarea readonly style="margin-left:28px;width:calc(100%-30px);height:40px;border-radius:8px;border:1.5px solid #dde;padding:8px;font-family:Consolas,monospace;font-size:10px;resize:none;margin-bottom:14px;background:#f8f9fa">当用户请求不清晰时，主动询问是否需要截图查看。</textarea>
    <div class="chk-row" onclick="toggleCustomLogic()" id="chkCustomLogic"><div class="chk-box"></div><div><div class="chk-label">为 Claude Code 添加底层逻辑</div><div class="chk-desc">自定义 CLAUDE.md 内容，控制 Claude Code 行为</div></div></div>
    <div class="expand" id="expCustomLogic"><div class="field-panel"><div class="fw"><label>CLAUDE.md 内容</label><textarea id="txtClaudeMd" placeholder="# CLAUDE.md&#10;你是..."></textarea></div></div></div>
  </div>
</div>

<div class="page" id="pg4">
  <div class="banner step"><div class="badge">4</div><span class="st">安全模式</span></div>
  <div class="ct">
    <div class="opt-cards">
      <div class="opt-card" id="optSafe" onclick="pickSec('safe')"><div class="o-dot"></div><div><div class="o-title">安全模式</div><div class="o-desc">高威胁操作需要用户确认</div></div></div>
      <div class="opt-card sel" id="optPro" onclick="pickSec('pro')"><div class="o-dot"></div><div><div class="o-title">专业通行模式 (推荐)</div><div class="o-desc">所有操作无需确认 — 适合高级用户</div></div></div>
    </div>
  </div>
</div>

<div class="page" id="pg5">

  <div class="ct" style="overflow-y:auto">

      <div class="opt-card sel" id="optDS" onclick="pickApi('deepseek')"><div class="o-dot"></div><div><div class="o-title">DeepSeek <span class="badge-tag rec">推荐</span></div><div class="o-desc">deepseek-v4-pro[1m] · 4个模型槽预填 · subagent 用 v4-flash</div></div></div>
      <div class="opt-card" id="optCust" onclick="pickApi('custom')"><div class="o-dot"></div><div><div class="o-title">自定义选择模型</div><div class="o-desc">自行填入 API 密钥、请求地址、模型映射（类似 CC Switch）</div></div></div>

      <div><label>Opus 默认模型 <span class="req">*必填</span></label><input type="text" placeholder="opus-model" id="cOpus"></div>
      <div class="fw"><div class="chk-row on" onclick="this.classList.toggle('on')" id="chkSub">

      <div class="fw" id="subFld" style="display:none"><input type="text" placeholder="subagent-model" id="cSub"></div>

      <div class="fw"><div class="chk-row" id="chkNoUp" onclick="this.classList.toggle('on');S.noUpdate=this.classList.contains('on')"><div class="chk-box"></div><div class="chk-label">禁用自动更新</div></div></div>
    </div></div>
  </div>
</div>

<div class="page" id="pg6">
  <div class="banner step"><div class="badge" id="cfgBadge">6</div><span class="st">安装配置</span><span class="step-info" id="cfgStepInfo"></span></div>
  <div class="ct">
    <div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:12px">选择安装位置</div>
    <div class="flow-row"><span>默认盘符:</span><select id="cfgDrive" onchange="S.drive=this.value;refreshPaths()">${optDrive(S.drive)}</select></div>
    <div class="path-list" id="pathHint"></div>
    <div class="chk-row" id="chkCustomPath" onclick="toggleCustomPaths()"><div class="chk-box"></div><div><div class="chk-label">工具自定义安装位置</div><div class="chk-desc">单独指定每个工具安装到哪个盘符</div></div></div>
    <div class="expand" id="expCustPath"><div class="field-panel" id="custPathFields"></div></div>
  </div>
</div>

<div class="page" id="pg7">
  <div class="banner step"><div class="badge" id="insBadge">7</div><span class="st">安装</span><span class="step-info" id="insStepInfo"></span></div>
  <div class="ct">
    <button class="install-btn" id="btnInstall" onclick="startInstall()">开始安装</button>
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progFill"></div></div></div>
    <div class="terminal" id="termLog">就绪 — 点击"开始安装"按钮...</div>
  </div>
</div>`;

  // Post-render setup
  refreshPaths();
  buildSkillRows();
  detectEnv();
  updateApiUI();
  updateSteps();
}

// ═══ NAVIGATION ═══
function setPage(n) {
  S.page = n;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById('pg'+n); if (pg) pg.classList.add('active');
  const nav = document.getElementById('navBar');
  const btnN = document.getElementById('btnNext');
  if (n === 0 || S.installing) { nav.style.display = 'none'; }
  else { nav.style.display = 'flex'; btnN.style.display = (n===7)?'none':''; }
  if (n===6) refreshPaths();
  if (n===5) updateApiUI();
  updateSteps();
  document.getElementById('pageArea').scrollTop = 0;
}

function updateSteps() {
  const ab = document.getElementById('apiBadge'); if (ab) ab.textContent = S.simple ? '1' : '5';
  const cb = document.getElementById('cfgBadge'); if (cb) cb.textContent = S.simple ? '2' : '6';
  const ib = document.getElementById('insBadge'); if (ib) ib.textContent = S.simple ? '3' : '7';
  const asi = document.getElementById('apiStepInfo'); if (asi) asi.textContent = S.simple ? '第 1 步 / 共 3 步' : '';
  const csi = document.getElementById('cfgStepInfo'); if (csi) csi.textContent = S.simple ? '第 2 步 / 共 3 步' : '';
  const isi = document.getElementById('insStepInfo'); if (isi) isi.textContent = S.simple ? '第 3 步 / 共 3 步' : '';
}

function pickMode(isSimple) { S.simple = isSimple; updateSteps(); setPage(isSimple ? 5 : 1); renderAll(); setPage(isSimple ? 5 : 1); }
function goNext() {
  if (S.page === 5 && !validateApi()) return;
  if (S.simple) { if (S.page===5) setPage(6); else if (S.page===6) setPage(7); }
  else { if (S.page<7) setPage(S.page+1); }
}
function goBack() {
  if (S.simple) { if (S.page===5) setPage(0); else if (S.page===6) setPage(5); else if (S.page===7) setPage(6); }
  else { if (S.page>0) setPage(S.page-1); }
}

// ═══ LANGUAGE ═══
function switchLang(lang) {
  S.lang = lang;
  applyLang();
  // Re-render current page-specific text
  if (S.page === 1) detectEnv();
  if (S.page === 2) updateSkillsText();
}

// ═══ PAGE 1: ENV DETECTION ═══
function detectEnv() {
  const cards = document.getElementById('statCards');
  const pathEl = document.getElementById('envPath');
  const items = [
    {n:'Node.js',ok:false,ver:T('detecting')},
    {n:'Git',ok:false,ver:T('detecting')},
    {n:'Python',ok:false,ver:T('detecting')},
    {n:'Claude Code',ok:false,ver:T('detecting')},
  ];
  cards.innerHTML = items.map(i => `<div class="stat-card"><div class="sdot"></div><span class="sn">${i.n}</span><span class="sv" id="sv${i.n}">${i.ver}</span></div>`).join('');
  pathEl.textContent = `路径: Node → ${S.drive}\\Claude Code tool\\NodeJS  Git → ${S.drive}\\Claude Code tool\\Git  npm → ${S.drive}\\Claude Code tool\\npm-global`;

  checkCmd('node','--version').then(v => updateStat(0, 'Node.js', v, 'v'));
  checkCmd('git','--version').then(v => updateStat(1, 'Git', v, 'git version '));
  checkCmd('python','--version').then(v => updateStat(2, 'Python', v, 'Python '));
  checkCmd('claude','--version').then(v => updateStat(3, 'Claude Code', v, ''));
}

async function checkCmd(cmd, args) {
  try {
    const r = await fetch(`${BASE()}/api/check-cmd?cmd=${encodeURIComponent(cmd)}&args=${encodeURIComponent(args)}`);
    const j = await r.json();
    return j.ok ? j.ver : '';
  } catch(e) { return ''; }
}

function updateStat(idx, name, ver, prefix) {
  const cards = document.getElementById('statCards').children;
  if (idx >= cards.length) return;
  const card = cards[idx]; const ok = ver !== '';
  card.className = 'stat-card ' + (ok ? 'ok' : 'no');
  card.children[1].textContent = name + ': ' + (ok ? T('installed') : T('not_installed'));
  card.children[2].textContent = ok ? ver.replace(prefix,'').trim() : '—';
}

// ═══ PAGE 2: SKILLS ═══
function buildSkillRows() {
  const el = document.getElementById('skillList'); if (!el) return;
  el.innerHTML = SKILLS.map((s,i) => `<div class="skill-row on" data-idx="${i}" onclick="toggleSkill(${i},this)"><div class="sk-chk"></div><span class="sk-name">${SKILL_NAMES[i]}</span><span class="sk-desc">${['开发工作流全家桶','20万+Skills搜索引擎','Word/Excel/PDF/PPT文档','高质量有风格UI','创建/修改自定义Skills','Prompt压缩器','操控本地浏览器','长期跨会话记忆','AI摆烂时强制换思路','架构/流程图生成'][i]}</span></div>`).join('');
}

function toggleSkill(idx, row) {
  row.classList.toggle('on');
  const skillId = SKILLS[idx];
  if (row.classList.contains('on')) { if (!S.skills.includes(skillId)) S.skills.push(skillId); }
  else { S.skills = S.skills.filter(s => s !== skillId); }
}

function toggleAllSkills() {
  const rows = document.querySelectorAll('#skillList .skill-row');
  const allOn = Array.from(rows).every(r => r.classList.contains('on'));
  rows.forEach(r => { if (allOn) r.classList.remove('on'); else r.classList.add('on'); });
  S.skills = allOn ? [] : [...SKILLS];
}

// ═══ PAGE 3: TOOLS ═══
function toggleCustomLogic() {
  const row = document.getElementById('chkCustomLogic');
  row.classList.toggle('on');
  S.showCustomLogic = row.classList.contains('on');
  const exp = document.getElementById('expCustomLogic');
  if (S.showCustomLogic) exp.classList.add('show'); else exp.classList.remove('show');
}

// ═══ PAGE 4: SECURITY ═══
function pickSec(val) {
  document.getElementById('optSafe').classList.toggle('sel', val==='safe');
  document.getElementById('optPro').classList.toggle('sel', val==='pro');
}

// ═══ PAGE 5: API ═══
function pickApi(val) {
  S.api = val;
  ['optAnth','optDS','optCust'].forEach(id => document.getElementById(id).classList.remove('sel'));
  if (val==='anthropic') document.getElementById('optAnth').classList.add('sel');
  if (val==='deepseek') document.getElementById('optDS').classList.add('sel');
  if (val==='custom') document.getElementById('optCust').classList.add('sel');
  updateApiUI();
}

function updateApiUI() {
  document.getElementById('expDS').classList.toggle('show', S.api==='deepseek');
  document.getElementById('expCust').classList.toggle('show', S.api==='custom');

  // Subagent toggle
  const subRow = document.getElementById('chkSub');
  const subFld = document.getElementById('subFld');
  if (subRow && subFld) {
    subRow.onclick = function() { this.classList.toggle('on'); subFld.style.display = this.classList.contains('on') ? 'block' : 'none'; };
  }
}

function validateApi() {
  if (S.api === 'anthropic') return true;
  if (S.api === 'deepseek') {
    if (!(document.getElementById('dsKey')?.value?.trim())) { toast('请输入 DeepSeek API Key'); return false; }
    return true;
  }
  if (S.api === 'custom') {
    if (!(document.getElementById('cKey')?.value?.trim())) { toast('请输入 API Key'); return false; }
    if (!(document.getElementById('cUrl')?.value?.trim())) { toast('请输入请求地址'); return false; }
    if (!(document.getElementById('cMain')?.value?.trim())) { toast('请输入主模型'); return false; }
    if (!(document.getElementById('cHaiku')?.value?.trim())) { toast('请输入 Haiku 模型'); return false; }
    if (!(document.getElementById('cSonnet')?.value?.trim())) { toast('请输入 Sonnet 模型'); return false; }
    if (!(document.getElementById('cOpus')?.value?.trim())) { toast('请输入 Opus 模型'); return false; }
    return true;
  }
  return true;
}

function toast(msg) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = '⚠ ' + msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ═══ PAGE 6: INSTALL CONFIG ═══
function refreshPaths() {
  const el = document.getElementById('pathHint'); if (!el) return;
  const d = S.drive;
  el.innerHTML = TOOLS.map(t => `${t.name}${t.ver?' '+t.ver:''} → <code>${d}\\Claude Code tool\\${t.sub}</code>`).join('<br>');
  // Custom path fields
  const fld = document.getElementById('custPathFields'); if (!fld) return;
  fld.innerHTML = TOOLS.map(t => {
    const td = S.toolDrives[t.id] || d;
    return `<div style="display:flex;align-items:center;gap:8px"><span style="font-weight:600;font-size:11px;color:var(--text);width:110px">${t.name}</span><select data-tool="${t.id}" onchange="S.toolDrives['${t.id}']=this.value;refreshPaths()" style="width:70px">${optDrive(td)}</select><span style="font-size:10px;color:var(--text2)">→ ${td}\\Claude Code tool\\${t.sub}</span></div>`;
  }).join('');
}

function toggleCustomPaths() {
  const row = document.getElementById('chkCustomPath');
  row.classList.toggle('on');
  S.showCustomPaths = row.classList.contains('on');
  const exp = document.getElementById('expCustPath');
  if (S.showCustomPaths) { exp.classList.add('show'); refreshPaths(); }
  else exp.classList.remove('show');
}

// ═══ PAGE 7: INSTALL ═══
async function startInstall() {
  if (S.installing) return;
  S.installing = true; S.installDone = false;
  document.getElementById('btnInstall').disabled = true;
  document.getElementById('btnInstall').textContent = '安装中...';
  document.getElementById('navBar').style.display = 'none';
  document.getElementById('termLog').textContent = '正在启动安装引擎...';
  document.getElementById('progFill').style.width = '0%';

  // Build settings - read custom paths directly from DOM
  const d = S.drive;
  const toolIds = ['node','git','npm','cctools','python','tesseract'];
  const toolDirs = ['NodeJS','Git','npm-global','cc-tools','Python312','Tesseract-OCR'];
  const drives = {};
  if (S.showCustomPaths) {
    toolIds.forEach((id, i) => {
      // Try reading from DOM dropdown first
      const sel = document.querySelector(`#custPathFields select[data-tool="${id}"]`);
      if (sel && sel.value) { drives[id] = sel.value; }
      else if (S.toolDrives[id]) { drives[id] = S.toolDrives[id]; }
      else { drives[id] = d; }
    });
  }
  const td = (i) => (S.showCustomPaths ? drives[toolIds[i]] : d) + '\\Claude Code tool\\' + toolDirs[i];
  const settings = {
    IsSimple: S.simple, Drive: d,
    NodePath: td(0), GitPath: td(1), NpmPrefix: td(2),
    ToolsPath: td(3), PythonPath: td(4), TesseractPath: td(5),
    PipPath: d+'\\Python-packages',
    InstallTools: document.getElementById('chkTools')?.classList.contains('on') ?? true,
    InstallLogic: document.getElementById('chkLogic')?.classList.contains('on') ?? true,
    InstallCustomLogic: S.showCustomLogic,
    CustomLogicContent: document.getElementById('txtClaudeMd')?.value ?? '',
    Skills: S.skills,
    BypassPermissions: document.getElementById('optPro')?.classList.contains('sel') ?? true,
    ApiProvider: S.api,
    ApiKey: S.api==='deepseek' ? (document.getElementById('dsKey')?.value??'') : (document.getElementById('cKey')?.value??''),
    ApiBaseUrl: document.getElementById('cUrl')?.value??'',
    CustomMainModel: document.getElementById('cMain')?.value??'',
    CustomHaikuModel: document.getElementById('cHaiku')?.value??'',
    CustomSonnetModel: document.getElementById('cSonnet')?.value??'',
    CustomOpusModel: document.getElementById('cOpus')?.value??'',
    CustomSubagentModel: document.getElementById('cSub')?.value??'',
    MaxThinking: S.maxThinking,
    NoUpdate: S.noUpdate,
  };

  try {
    const r = await fetch(`${BASE()}/api/install`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(settings) });
    if (!r.ok) throw new Error('API error: '+r.status);
    document.getElementById('termLog').textContent = '安装已启动，等待进度...';
    S.timer = setInterval(pollProgress, 500);
  } catch(e) {
    document.getElementById('termLog').textContent = '启动失败: ' + e.message;
    S.installing = false; document.getElementById('btnInstall').disabled = false;
    document.getElementById('btnInstall').textContent = '开始安装';
  }
}

async function pollProgress() {
  try {
    const r = await fetch(`${BASE()}/api/progress`);
    const p = await r.json();
    document.getElementById('termLog').textContent = p.logs || '';
    const el = document.getElementById('progFill');
    if (p.total > 0) el.style.width = (p.percent / p.total * 100) + '%';
    if (p.done) {
      clearInterval(S.timer);
      el.style.width = '100%';
      S.installing = false; S.installDone = true;
      document.getElementById('navBar').style.display = 'flex';
      showCompleteModal();
    }
    if (p.error) {
      clearInterval(S.timer);
      S.installing = false;
      document.getElementById('navBar').style.display = 'flex';
      document.getElementById('btnInstall').disabled = false;
      document.getElementById('btnInstall').textContent = '重试安装';
    }
  } catch(e) {}
}

function showCompleteModal() {
  const d = S.drive;
  const td = (id) => (S.showCustomPaths && S.toolDrives[id]) ? S.toolDrives[id] : d;
  const tools = TOOLS.map(t => `${t.name}${t.ver?' '+t.ver:''} → ${td(t.id)}\\Claude Code tool\\${t.sub}`).join('<br>');
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay"><div class="modal-box">
      <h2>✅ 安装完成!</h2><div class="mo-sub">Claude Code Installer v1.0.6 · Shimizu</div>
      <div class="mo-list">
        <span class="cat">已安装工具</span>${tools}
        <span class="cat" style="margin-top:12px">已安装 Skills</span>${S.skills.map(s => SKILL_NAMES[SKILLS.indexOf(s)]).join(', ')}
        <span class="cat" style="margin-top:12px">配置</span>
        settings.json → ~/.claude/<br>CLAUDE.md → ~/<br>桌面快捷方式: Claude Code / CC Switch
      </div>
      <button class="mo-btn" onclick="document.getElementById('modalContainer').innerHTML=''">完成</button>
    </div></div>
  `;
}

// ═══ START ═══
init();
</script>
</body>
</html>
