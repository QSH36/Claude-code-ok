<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Installer V18 — Final Preview</title>
<style>
:root {
  --bg: #f0f2f5; --card: #ffffff; --brand: #0066FF; --brand-end: #4DA3FF;
  --green: #00B84D; --orange: #FF6B35; --purple: #8B5CF6; --text: #1a1a2e; --text2: #6b7280;
  --red: #EF4444; --transition: cubic-bezier(.34,1.56,.64,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.orb { position:absolute; border-radius:50%; filter:blur(100px); opacity:.35; animation:float 14s ease-in-out infinite; }
.orb:nth-child(1) { width:500px; height:500px; background:#0066FF; top:-15%; left:-10%; animation-delay:0s; }
.orb:nth-child(2) { width:400px; height:400px; background:#8B5CF6; top:50%; right:-10%; animation-delay:-5s; }
.orb:nth-child(3) { width:350px; height:350px; background:#00B84D; bottom:-15%; left:30%; animation-delay:-9s; }
@keyframes float { 0%,100% { transform:translate(0,0) scale(1); } 33% { transform:translate(40px,-40px) scale(1.08); } 66% { transform:translate(-30px,20px) scale(.94); } }

.app { position:relative; z-index:1; width:820px; max-width:100%; background:var(--card); border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.04); overflow:hidden; animation:appIn .6s var(--transition); }
@keyframes appIn { from { opacity:0; transform:translateY(30px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
.titlebar { height:36px; background:#1e1e2e; display:flex; align-items:center; padding:0 14px; gap:8px; }
.titlebar .dot { width:10px; height:10px; border-radius:50%; }
.titlebar .dot.r { background:#FF5F57; } .titlebar .dot.y { background:#FFBD2E; } .titlebar .dot.g { background:#28CA41; }
.titlebar .ttl { color:#ccc; font-size:11px; margin-left:12px; letter-spacing:.5px; }

.banner { background:linear-gradient(135deg,var(--brand),#3B82F6,var(--brand-end)); padding:28px 32px; text-align:center; position:relative; overflow:hidden; }
.banner::after { content:''; position:absolute; top:-50%; right:-20%; width:300px; height:300px; background:rgba(255,255,255,.04); border-radius:50%; animation:bannerGlow 8s ease-in-out infinite; }
@keyframes bannerGlow { 0%,100% { transform:translate(0,0) scale(1); } 50% { transform:translate(-30px,20px) scale(1.2); } }
.banner .brand { font-size:10px; letter-spacing:6px; text-transform:uppercase; color:rgba(255,255,255,.45); margin-bottom:4px; position:relative; z-index:1; }
.banner h1 { font-size:24px; font-weight:700; color:#fff; position:relative; z-index:1; letter-spacing:-.3px; }
.banner .sub { font-size:12px; color:rgba(255,255,255,.65); margin-top:4px; position:relative; z-index:1; }

.step-bar { background:linear-gradient(135deg,var(--brand),var(--brand-end)); padding:12px 28px; display:flex; align-items:center; gap:12px; }
.step-badge { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.2); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; animation:badgePop .5s var(--transition); }
@keyframes badgePop { from { transform:scale(0); } to { transform:scale(1); } }
.step-bar .st { color:#fff; font-weight:700; font-size:14px; }

.content { padding:24px 28px; min-height:380px; }

.status-cards { display:flex; flex-direction:column; gap:10px; }
.status-card { display:flex; align-items:center; padding:14px 18px; border-radius:12px; background:#F9FAFB; border-left:3px solid #e5e7eb; transition:all .3s ease; animation:cardSlide .5s var(--transition) both; }
.status-card:nth-child(1) { animation-delay:.05s; } .status-card:nth-child(2) { animation-delay:.1s; }
.status-card:nth-child(3) { animation-delay:.15s; } .status-card:nth-child(4) { animation-delay:.2s; }
@keyframes cardSlide { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
.status-card.ok { background:#f0fdf4; border-left-color:var(--green); }
.status-card.no { background:#fff7ed; border-left-color:var(--orange); }
.status-card .dot { width:10px; height:10px; border-radius:50%; margin-right:12px; flex-shrink:0; }
.status-card.ok .dot { background:var(--green); } .status-card.no .dot { background:var(--orange); }
.status-card .name { font-weight:700; font-size:13px; color:var(--text); }
.status-card .ver { margin-left:auto; font-size:11px; color:var(--text2); }

.flow-links { margin-top:16px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.flow-links span { font-size:13px; font-weight:600; color:var(--text); }
.flow-links select { padding:6px 14px; border-radius:8px; border:1.5px solid #dde; font-size:13px; font-weight:600; color:var(--brand); background:#f0f4ff; outline:none; cursor:pointer; }
.flow-links .btn-retry { padding:7px 16px; border-radius:8px; background:#555; color:#fff; font-size:11px; font-weight:700; border:none; cursor:pointer; transition:all .2s ease; }
.flow-links .btn-retry:hover { background:#333; transform:scale(1.03); }

.option-cards { display:flex; flex-direction:column; gap:10px; }
.opt-card { padding:16px 18px; border-radius:12px; background:#F9FAFB; border:2px solid transparent; cursor:pointer; transition:all .25s ease; animation:cardSlide .4s var(--transition) both; }
.opt-card:hover { background:#f0f4ff; border-color:#c4d9ff; transform:translateX(4px); }
.opt-card.selected { background:#EEF2FF; border-color:var(--brand); box-shadow:0 0 0 3px rgba(0,102,255,.1); }
.opt-card .radio-row { display:flex; align-items:center; gap:10px; }
.opt-card .radio-dot { width:20px; height:20px; border-radius:50%; border:2px solid #ccc; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .3s ease; }
.opt-card.selected .radio-dot { border-color:var(--brand); background:var(--brand); }
.opt-card.selected .radio-dot::after { content:''; width:8px; height:8px; border-radius:50%; background:#fff; }
.opt-card .opt-title { font-weight:700; font-size:13px; color:var(--text); }
.opt-card .opt-desc { font-size:11px; color:var(--text2); margin-top:2px; }

.opt-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:9px; font-weight:700; margin-left:6px; }
.opt-badge.warn { background:#FFF3E0; color:#E65100; }
.opt-badge.rec { background:#E8F5E9; color:#2E7D32; }

.custom-fields { overflow:hidden; max-height:0; opacity:0; transition:max-height .5s var(--transition),opacity .4s ease,margin .4s ease; margin-top:0; }
.custom-fields.show { max-height:900px; opacity:1; margin-top:16px; }
.custom-fields .field-group { background:#FAFBFC; border-radius:12px; padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:12px; border:1.5px solid #eef; animation:fadeSlideIn .4s var(--transition) both; }
@keyframes fadeSlideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.field-group .field-label { font-size:11px; font-weight:600; color:var(--text); margin-bottom:4px; letter-spacing:.5px; }
.field-label .req { color:var(--red); margin-left:2px; }
.field-label .opt { color:var(--text2); font-weight:400; margin-left:2px; font-size:10px; }
.field-group input, .field-group textarea, .field-group select { width:100%; padding:10px 14px; border-radius:8px; border:1.5px solid #dde; font-size:12px; font-family:inherit; outline:none; transition:border-color .2s ease,box-shadow .2s ease; background:#fff; }
.field-group input:focus, .field-group textarea:focus, .field-group select:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(0,102,255,.08); }
.field-group input.error { border-color:var(--red); background:#FFF5F5; }
.field-group .full { grid-column:1/-1; }
.field-group textarea { resize:vertical; min-height:80px; font-family:'Cascadia Code',Consolas,monospace; font-size:11px; }

.section-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin:6px 0 4px; }
.checks { display:flex; gap:20px; margin-top:4px; flex-wrap:wrap; }
.check-item { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:var(--text); cursor:pointer; }

.install-btn { width:100%; padding:16px; border-radius:12px; background:linear-gradient(135deg,var(--green),#00D166); color:#fff; font-size:15px; font-weight:700; border:none; cursor:pointer; transition:all .3s ease; position:relative; overflow:hidden; }
.install-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,184,77,.3); }
.install-btn:active { transform:translateY(0); }
.install-btn::after { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.1) 50%,transparent 60%); animation:shimmer 3s infinite; }
@keyframes shimmer { 0% { transform:translateX(-100%) rotate(45deg); } 100% { transform:translateX(100%) rotate(45deg); } }

.terminal { margin-top:16px; background:#1a1b26; border-radius:12px; padding:16px 20px; font-family:'Cascadia Code',Consolas,monospace; font-size:11px; color:#a9b1d6; min-height:200px; line-height:1.7; animation:termIn .5s var(--transition); }
@keyframes termIn { from { opacity:0; transform:scaleY(.9); transform-origin:top; } to { opacity:1; transform:scaleY(1); } }
.terminal .dim { color:#565f89; } .terminal .green { color:#9ece6a; } .terminal .orange { color:#e0af68; } .terminal .blue { color:#7aa2f7; }

.navbar { display:flex; gap:12px; padding:16px 28px; background:linear-gradient(180deg,#1e1e2e,#16162a); align-items:center; }
.navbar button { padding:9px 20px; border-radius:8px; font-weight:700; font-size:12px; border:none; cursor:pointer; transition:all .2s ease; }
.btn-back { background:rgba(255,255,255,.1); color:#ccc; }
.btn-back:hover { background:rgba(255,255,255,.18); }
.btn-next { background:var(--brand); color:#fff; }
.btn-next:hover { background:#0052D9; transform:scale(1.03); }

.progress-wrap { margin-top:12px; }
.progress-bar { height:6px; border-radius:6px; background:#e5e7eb; overflow:hidden; }
.progress-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,var(--brand),var(--brand-end)); width:0%; transition:width .4s ease; animation:progAnim 4s ease-in-out infinite; }
@keyframes progAnim { 0% { width:5%; } 50% { width:45%; } 100% { width:68%; } }

.welcome-cards { display:flex; gap:16px; margin-top:20px; }
.welcome-card { flex:1; padding:24px 20px; border-radius:14px; cursor:pointer; transition:all .35s var(--transition); position:relative; overflow:hidden; }
.welcome-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:0 4px 4px 0; }
.welcome-card.pro { background:linear-gradient(135deg,#EEF2FF,#F5F8FF); } .welcome-card.pro::before { background:var(--brand); }
.welcome-card.simple { background:linear-gradient(135deg,#ECFDF5,#F5FFFA); } .welcome-card.simple::before { background:var(--green); }
.welcome-card:hover { transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,.08); }
.welcome-card .wc-icon { font-size:28px; margin-bottom:8px; } .welcome-card h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
.welcome-card p { font-size:11px; color:var(--text2); line-height:1.5; }
.welcome-card.pro h3 { color:var(--brand); } .welcome-card.simple h3 { color:var(--green); }

.page { animation:pageIn .45s var(--transition); }
@keyframes pageIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.pill-select { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; transition:all .2s ease; background:#EEF2FF; color:var(--brand); border:2px solid transparent; margin-bottom:12px; }
.pill-select:hover { background:#dde6ff; transform:scale(1.03); }

.skills-grid { display:flex; flex-direction:column; gap:6px; }
.skill-row { display:flex; align-items:center; padding:10px 14px; border-radius:10px; background:#FAFBFC; border-left:3px solid var(--brand); cursor:pointer; transition:all .2s ease; gap:12px; animation:cardSlide .4s var(--transition) both; }
.skill-row.disabled { border-left-color:#e5e7eb; background:#f8f8f9; cursor:default; opacity:.55; }
.skill-row:hover:not(.disabled) { background:#f0f4ff; transform:translateX(3px); }
.skill-row .sk-check { width:18px; height:18px; border-radius:4px; border:2px solid #ccc; flex-shrink:0; transition:all .2s ease; display:flex; align-items:center; justify-content:center; }
.skill-row.on .sk-check { background:var(--brand); border-color:var(--brand); }
.skill-row.on .sk-check::after { content:'✓'; color:#fff; font-size:11px; font-weight:700; }
.skill-row .sk-name { font-weight:700; font-size:12px; color:var(--text); flex-shrink:0; width:130px; }
.skill-row .sk-desc { font-size:10px; color:var(--text2); }

.path-list { margin-top:8px; font-size:11px; color:var(--text2); line-height:2; }
.path-list code { background:#eef2ff; color:var(--brand); padding:2px 6px; border-radius:4px; font-family:'Cascadia Code',Consolas,monospace; font-size:10px; font-weight:600; }

/* Tool path row */
.tool-path-row { display:flex; align-items:center; gap:8px; }
.tool-path-row .tp-name { font-weight:600; font-size:11px; color:var(--text); width:110px; flex-shrink:0; }
.tool-path-row .tp-drive { width:80px; }
.tool-path-row .tp-path { font-size:10px; color:var(--text2); flex:1; }

/* Validation toast */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:999;
  background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; border-radius:10px;
  padding:12px 24px; font-size:13px; font-weight:600;
  animation:toastIn .3s var(--transition); box-shadow:0 8px 24px rgba(239,68,68,.15); }
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-16px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* Completion modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:99; display:flex; align-items:center; justify-content:center; animation:fadeIn .3s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal-box { background:#fff; border-radius:16px; padding:32px; max-width:500px; width:90%; box-shadow:0 24px 60px rgba(0,0,0,.2); animation:modalPop .4s var(--transition); }
@keyframes modalPop { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
.modal-box h2 { font-size:18px; font-weight:700; color:var(--green); margin-bottom:4px; }
.modal-box .mo-sub { font-size:12px; color:var(--text2); margin-bottom:16px; }
.modal-box .mo-list { font-size:12px; color:var(--text); line-height:2; }
.modal-box .mo-list .cat { font-weight:700; color:var(--brand); margin-top:8px; display:block; }
.modal-box .mo-list code { background:#f0f4ff; padding:1px 6px; border-radius:4px; font-size:10px; color:var(--brand); }
.modal-box .mo-btn { margin-top:20px; width:100%; padding:12px; border-radius:10px; background:var(--brand); color:#fff; font-weight:700; font-size:13px; border:none; cursor:pointer; transition:all .2s ease; }
.modal-box .mo-btn:hover { background:#0052D9; }
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="app" id="app"></div>
<div id="toastContainer"></div>
<div id="modalContainer"></div>

<script>
const state = {
  simple: false,
  drive: 'C:',
  drives: ['C:','D:','E:','F:'],
  selectedApi: 'deepseek',
  showCustomLogic: false,
  showCustomPaths: false,
  claudeMdContent: '',
  // Custom tool paths - each is a drive letter
  toolDrives: { node:'', git:'', npm:'', cctools:'', python:'', tesseract:'' },
  maxThinking: true,
  noUpdate: false,
  // Install result tracking
  installed: [],
};

function navigate(pageIdx) {
  currentPage = pageIdx;
  const container = document.getElementById('app');
  const html = renderPage(pageIdx);
  container.innerHTML = `
    <div class="titlebar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><span class="ttl">Claude Code Installer v1.0.6 — Shimizu</span></div>
    ${html}
  `;
  bindEvents();
  container.scrollTop = 0;
}

function renderPage(idx) {
  switch(idx) {
    case 0: return renderWelcome();
    case 1: return renderEnv();
    case 2: return renderSkills();
    case 3: return renderTools();
    case 4: return renderSecurity();
    case 5: return renderApi();
    case 6: return renderSimpleApi();
    case 7: return renderInstall();
    default: return renderWelcome();
  }
}

function renderWelcome() {
  return `
    <div class="page">
      <div class="banner"><div class="brand">Shimizu</div><h1>Claude Code 安装器</h1><div class="sub">一键安装 · 永久免费 · v1.0.6</div></div>
      <div class="content">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;">选择安装方式</div>
        <div class="welcome-cards">
          <div class="welcome-card pro" id="cardPro"><div class="wc-icon">⚙️</div><h3>我是专业用户</h3><p>逐步选择 Skills、工具、安全模式、API 配置</p></div>
          <div class="welcome-card simple" id="cardSimple"><div class="wc-icon">🚀</div><h3>我是小白用户</h3><p>选择安装位置 → API 配置 → 一键安装</p></div>
        </div>
        <div style="margin-top:16px;font-size:11px;color:var(--text2);">专业模式：完整控制安装过程 &nbsp;|&nbsp; 小白模式：简易安装 · 快速配置</div>
      </div>
    </div>`;
}

function renderEnv() {
  const items = [
    {name:'Node.js',ok:true,ver:'v20.18.0'},{name:'Git',ok:true,ver:'2.45.2'},
    {name:'Python',ok:false,ver:'未安装'},{name:'Claude Code',ok:false,ver:'未安装'},
  ];
  return `
    <div class="page">
      <div class="step-bar"><div class="step-badge">1</div><span class="st">环境检测</span></div>
      <div class="content">
        <div class="flow-links">
          <span>语言:</span><select id="langSel"><option>中文</option><option>English</option></select>
          <span style="margin-left:12px;">安装盘符:</span>
          <select id="driveSel">${state.drives.map(d=>`<option ${d===state.drive?'selected':''}>${d}</option>`).join('')}</select>
          <button class="btn-retry">⟳ 重新检测</button>
        </div>
        <div class="status-cards" style="margin-top:16px;">
          ${items.map(i=>`<div class="status-card ${i.ok?'ok':'no'}"><div class="dot"></div><span class="name">${i.name}</span><span class="ver">${i.ver}</span></div>`).join('')}
        </div>
        <div style="margin-top:12px;font-size:11px;color:var(--text2);">路径: Node → ${state.drive}NodeJS &nbsp; Git → ${state.drive}Git &nbsp; npm → ${state.drive}npm-global</div>
      </div>
      ${renderNav(1)}
    </div>`;
}

function renderSkills() {
  const skills = [
    {name:'Superpowers',desc:'开发工作流全家桶',on:true},{name:'Find Skills',desc:'20万+Skills搜索引擎',on:true},
    {name:'Document Skills',desc:'Word/Excel/PDF/PPT文档',on:true},{name:'Frontend Design',desc:'高质量有风格UI',on:true},
    {name:'Skill Creator',desc:'创建/修改自定义Skills',on:true},{name:'Caveman',desc:'Prompt压缩器',on:true},
    {name:'Web Access',desc:'操控本地浏览器',on:true},{name:'Claude-mem',desc:'长期跨会话记忆',on:true},
    {name:'PUA Skill',desc:'AI摆烂时强制换思路',on:true},{name:'Excalidraw',desc:'架构/流程图生成',on:true},
    {name:'Code Review',desc:'并行5Agent代码审查',on:false,disabled:true},
    {name:'Security Audit',desc:'安全漏洞扫描',on:false,disabled:true},
    {name:'Test Generator',desc:'自动生成测试套件',on:false,disabled:true},
  ];
  return `
    <div class="page">
      <div class="step-bar"><div class="step-badge">2</div><span class="st">Skills 选择</span></div>
      <div class="content">
        <div class="pill-select" id="selectAllPill"><span class="icon">☐</span> 全选 / 取消全选</div>
        <div class="skills-grid">
          ${skills.map((s,i)=>`<div class="skill-row ${s.on?'on':''} ${s.disabled?'disabled':''}" data-skill="${i}"><div class="sk-check"></div><span class="sk-name">${s.name}</span><span class="sk-desc">${s.desc}</span></div>`).join('')}
        </div>
        <div style="margin-top:8px;font-size:10px;color:var(--text2);">灰色项暂不支持自动安装 (genskills--)</div>
      </div>
      ${renderNav(2)}
    </div>`;
}

function renderTools() {
  return `
    <div class="page">
      <div class="step-bar"><div class="step-badge">3</div><span class="st">工具与逻辑</span></div>
      <div class="content">
        <div class="check-item" style="margin-bottom:8px;"><input type="checkbox" checked id="chkTools"> <label for="chkTools" style="font-weight:700;font-size:13px;">安装截图操作工具 (Python)</label></div>
        <div style="font-size:11px;color:var(--text2);margin-left:24px;margin-bottom:20px;">scr / ocr / see / act / browser — 屏幕截图、OCR、鼠标键盘、浏览器自动化</div>

  const isSimple = state.simple;
  return `

      <div class="step-bar"><div class="step-badge">${isSimple?'3':'7'}</div><span class="st">安装</span>${isSimple?'<span style="color:rgba(255,255,255,.6);font-size:11px;margin-left:auto;">第 3 步 / 共 3 步</span>':''}</div>
      <div class="content">
        <div class="checks" style="margin-bottom:14px;">
          <label class="check-item"><input type="checkbox" checked> 启用最大强度思考</label>

function renderNav(page) {
  if (page === 0) return '';
  const isInstall = (page === 7);
  return `<div class="navbar"><button class="btn-back" id="btnBack">← 上一步</button>${!isInstall?`<button class="btn-next" id="btnNext">下一步 →</button>`:''}</div>`;
}

function getNextPage(page) {
  if (state.simple) { if (page===5) return 6; if (page===6) return 7; return page+1; }
  if (page===6) return 7; return page+1;
}

function selectOption(el) {
  el.parentElement.querySelectorAll('.opt-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

function showToast(msg) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2500);
}

function validateAPI() {
  if (state.selectedApi === 'anthropic') return true;
  if (state.selectedApi === 'deepseek') {
    const key = (document.getElementById('dsKey')||{}).value||'';
    if (!key.trim()) { showToast('⚠ 请输入 DeepSeek API Key'); return false; }
    return true;
  }
  if (state.selectedApi === 'custom') {
    const custKey = (document.getElementById('custKey')||{}).value||'';
    const custUrl = (document.getElementById('custUrl')||{}).value||'';
    const custMain = (document.getElementById('custMain')||{}).value||'';
    const custHaiku = (document.getElementById('custHaiku')||{}).value||'';
    const custSonnet = (document.getElementById('custSonnet')||{}).value||'';
    const custOpus = (document.getElementById('custOpus')||{}).value||'';
    if (!custKey.trim()) { showToast('⚠ 请输入 API Key'); return false; }
    if (!custUrl.trim()) { showToast('⚠ 请输入请求地址'); return false; }
    if (!custMain.trim()) { showToast('⚠ 请输入主模型名称'); return false; }
    if (!custHaiku.trim()) { showToast('⚠ 请输入 Haiku 默认模型'); return false; }
    if (!custSonnet.trim()) { showToast('⚠ 请输入 Sonnet 默认模型'); return false; }
    if (!custOpus.trim()) { showToast('⚠ 请输入 Opus 默认模型'); return false; }
    return true;
  }
  return true;
}

function simulateInstall() {
  const term = document.getElementById('termLog');
  const prog = document.getElementById('progFill');
  if (!term || !prog) return;

  const d = state.drive;
  const useCustom = state.showCustomPaths;
  const tools = [
    {name:'Node.js',sub:'NodeJS',ver:'v20.18.0'},
    {name:'Git',sub:'Git',ver:'2.45.2'},
    {name:'npm config',sub:'npm-global',ver:''},
    {name:'Claude Code',sub:'cc-tools',ver:'(原生 .exe)'},
    {name:'Python',sub:'Python312',ver:'3.12.4'},
    {name:'Tesseract OCR',sub:'Tesseract-OCR',ver:'5.3.3'},
  ];

  const installed = [];
  const skillsOn = ['Superpowers','Find Skills','Document Skills','Frontend Design','Skill Creator','Caveman','Web Access','Claude-mem','PUA Skill','Excalidraw'];
  let log = term.innerHTML;

  const steps = [
    {n:'Node.js',fn:()=>{const p=useCustom?(state.toolDrives.node||d):d;installed.push({name:'Node.js',path:`${p}\\Claude Code tool\\NodeJS`,ver:'v20.18.0'});}},
    {n:'Git',fn:()=>{const p=useCustom?(state.toolDrives.git||d):d;installed.push({name:'Git',path:`${p}\\Claude Code tool\\Git`,ver:'2.45.2'});}},
    {n:'npm prefix',fn:()=>{const p=useCustom?(state.toolDrives.npm||d):d;installed.push({name:'npm global',path:`${p}\\Claude Code tool\\npm-global`});}},
    {n:'Claude Code (原生 .exe)',fn:()=>{const p=useCustom?(state.toolDrives.cctools||d):d;installed.push({name:'Claude Code',path:`${p}\\Claude Code tool\\cc-tools`});}},
  ];

  let idx = 0;
  function nextStep() {
    if (idx >= steps.length) {
      // Skills
      log += `<span class="green">[5/9] Skills: ${skillsOn.join(', ')}... ✓</span>\n`;
      skillsOn.forEach(s=>installed.push({name:`Skill: ${s}`,path:'(npx global)'}));
      log += `<span class="green">[6/9] settings.json → ~/.claude/... ✓</span>\n`;
      installed.push({name:'settings.json',path:'~/.claude/settings.json'});
      log += `<span class="green">[7/9] CLAUDE.md → ~/... ✓</span>\n`;
      log += `<span class="green">[8/9] claude install (启动器+PATH)... ✓</span>\n`;
      log += `<span class="green">[9/9] 桌面快捷方式... ✓</span>\n`;
      log += `\n<span class="dim">═══════════════════════════════════</span>\n`;
      log += `<span class="green">  ✅ 安装完成!</span>\n`;
      log += `<span class="dim">═══════════════════════════════════</span>\n`;
      term.innerHTML = log;
      prog.style.width = '100%';
      prog.style.animation = 'none';
      setTimeout(showCompletionModal, 600);
      return;
    }
    const s = steps[idx];
    log += `<span class="orange">[${idx+1}/9] ${s.n}...</span>\n`;
    term.innerHTML = log;
    term.scrollTop = term.scrollHeight;
    s.fn();
    prog.style.width = ((idx+1)/9*100)+'%';
    idx++;
    setTimeout(nextStep, 700);
  }
  nextStep();
}

function showCompletionModal() {
  const mc = document.getElementById('modalContainer');
  const items = [
    {name:'Node.js',path:`${state.drive}\\Claude Code tool\\NodeJS`,ver:'v20.18.0'},
    {name:'Git',path:`${state.drive}\\Claude Code tool\\Git`,ver:'2.45.2'},
    {name:'npm global',path:`${state.drive}\\Claude Code tool\\npm-global`},
    {name:'Claude Code',path:`${state.drive}\\Claude Code tool\\cc-tools`},
    {name:'Python 3.12',path:`${state.drive}\\Claude Code tool\\Python312`},
    {name:'Tesseract OCR',path:`${state.drive}\\Claude Code tool\\Tesseract-OCR`},
  ];
  let toolList = items.map(i=>`${i.name}${i.ver?' '+i.ver:''} → <code>${i.path}</code>`).join('<br>');
  let skillList = 'Superpowers, Find Skills, Document Skills, Frontend Design,<br>Skill Creator, Caveman, Web Access, Claude-mem,<br>PUA Skill, Excalidraw';
  mc.innerHTML = `
    <div class="modal-overlay" onclick="this.remove()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <h2>✅ 安装完成!</h2>
        <div class="mo-sub">Claude Code Installer v1.0.6 · Shimizu</div>
        <div class="mo-list">
          <span class="cat">已安装工具</span>
          ${toolList}
          <span class="cat" style="margin-top:12px;">已安装 Skills (10)</span>
          ${skillList}
          <span class="cat" style="margin-top:12px;">配置</span>
          settings.json → ~/.claude/<br>
          CLAUDE.md → ~/<br>
          🔗 桌面快捷方式: Claude Code / CC Switch
        </div>
        <button class="mo-btn" onclick="document.getElementById('modalContainer').innerHTML=''">完成</button>
      </div>
    </div>
  `;
}

function bindEvents() {
  const cardPro = document.getElementById('cardPro');
  const cardSimple = document.getElementById('cardSimple');
  if (cardPro) cardPro.onclick = () => { state.simple = false; navigate(1); };
  if (cardSimple) cardSimple.onclick = () => { state.simple = true; navigate(5); };

  const driveSel = document.getElementById('driveSel');
  if (driveSel) driveSel.onchange = e => { state.drive = e.target.value; };

  const driveSel6 = document.getElementById('driveSel6');
  if (driveSel6) driveSel6.onchange = e => { state.drive = e.target.value; updatePathHint(e.target.value); };

  // Custom tool path drive selectors
  document.querySelectorAll('.tp-drive').forEach(sel => {
    sel.onchange = e => {
      const toolId = e.target.dataset.tool;
      state.toolDrives[toolId] = e.target.value;
      // Update the path display next to it
      const subMap = {node:'NodeJS',git:'Git',npm:'npm-global',cctools:'cc-tools',python:'Python312',tesseract:'Tesseract-OCR'};
      const pathSpan = e.target.parentElement.querySelector('.tp-path');
      if (pathSpan) pathSpan.innerHTML = `→ <code>${e.target.value}\\Claude Code tool\\${subMap[toolId]}</code>`;
    };
  });

  const chkCustomPaths = document.getElementById('chkCustomPaths');
  if (chkCustomPaths) chkCustomPaths.onchange = e => {
    state.showCustomPaths = e.target.checked;
    const f = document.getElementById('customPathFields');
    if (f) { if(e.target.checked) f.classList.add('show'); else f.classList.remove('show'); }
  };

  const chkCustomLogic = document.getElementById('chkCustomLogic');
  if (chkCustomLogic) chkCustomLogic.onchange = e => {
    state.showCustomLogic = e.target.checked;
    const f = document.getElementById('customLogicFields');
    if (f) { if(e.target.checked) f.classList.add('show'); else f.classList.remove('show'); }
  };

  // Subagent checkbox
  const chkSub = document.getElementById('chkSubagent');
  if (chkSub) chkSub.onchange = e => {
    document.getElementById('subagentField').style.display = e.target.checked ? 'block' : 'none';
  };

  // API option cards
  ['optAnthropic','optDeepseek','optCustom'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.onclick = () => {
      state.selectedApi = id==='optAnthropic'?'anthropic':id==='optDeepseek'?'deepseek':'custom';
      navigate(5);
    };
  });

  // Skill rows
  document.querySelectorAll('.skill-row:not(.disabled)').forEach(r=>{r.onclick=()=>{r.classList.toggle('on');};});
  const pill = document.getElementById('selectAllPill');
  if (pill) { let on=true; pill.onclick=()=>{on=!on;document.querySelectorAll('.skill-row:not(.disabled)').forEach(r=>{if(on)r.classList.add('on');else r.classList.remove('on');});pill.querySelector('.icon').textContent=on?'☑':'☐';}; }

  const btnRetry = document.querySelector('.btn-retry');
  if (btnRetry) btnRetry.onclick = () => navigate(1);

  // Nav
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');
  if (btnBack) btnBack.onclick = () => {
    if (state.simple && currentPage===5) navigate(0);
    else if (state.simple && currentPage===6) navigate(5);
    else if (state.simple && currentPage===7) navigate(6);
    else navigate(currentPage-1);
  };
  if (btnNext) btnNext.onclick = () => {
    if (currentPage === 5 && !validateAPI()) return;
    const np = getNextPage(currentPage);
    navigate(np);
  };

  // Install button
  const btnInstall = document.getElementById('btnInstall');
  if (btnInstall) btnInstall.onclick = () => { btnInstall.disabled = true; btnInstall.textContent = '安装中...'; simulateInstall(); };
}

function updatePathHint(drive) {
  const el = document.getElementById('pathHint');
  if (!el) return;
  const tools = [
    {name:'Node.js',sub:'NodeJS'},{name:'Git',sub:'Git'},{name:'npm global',sub:'npm-global'},
    {name:'Claude Code 工具',sub:'cc-tools'},{name:'Python',sub:'Python312'},{name:'Tesseract OCR',sub:'Tesseract-OCR'},
  ];
  el.innerHTML = `所有工具将安装在所选盘符:<br>${tools.map(t=>`&nbsp;&nbsp;📁 <code>${drive}\\Claude Code tool\\${t.sub}</code> — ${t.name}`).join('<br>')}`;
  // Also update custom path dropdowns' path displays
  document.querySelectorAll('.tp-drive').forEach(sel => {
    const tid = sel.dataset.tool;
    const subMap = {node:'NodeJS',git:'Git',npm:'npm-global',cctools:'cc-tools',python:'Python312',tesseract:'Tesseract-OCR'};
    const ps = sel.parentElement.querySelector('.tp-path');
    if (ps && !state.toolDrives[tid]) ps.innerHTML = `→ <code>${drive}\\Claude Code tool\\${subMap[tid]}</code>`;
  });
}

navigate(0);
