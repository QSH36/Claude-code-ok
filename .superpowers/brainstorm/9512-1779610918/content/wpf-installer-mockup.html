<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Installer V18 — WPF Preview</title>
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --brand: #0066FF;
  --brand-end: #4DA3FF;
  --green: #00B84D;
  --orange: #FF6B35;
  --purple: #8B5CF6;
  --text: #1a1a2e;
  --text2: #6b7280;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);
  --transition: cubic-bezier(.34,1.56,.64,1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei UI', sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* Floating orbs */
.bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.orb {
  position:absolute; border-radius:50%; filter:blur(100px); opacity:.35;
  animation: float 14s ease-in-out infinite;
}
.orb:nth-child(1) { width:500px; height:500px; background:#0066FF; top:-15%; left:-10%; animation-delay:0s; }
.orb:nth-child(2) { width:400px; height:400px; background:#8B5CF6; top:50%; right:-10%; animation-delay:-5s; }
.orb:nth-child(3) { width:350px; height:350px; background:#00B84D; bottom:-15%; left:30%; animation-delay:-9s; }

@keyframes float {
  0%,100% { transform:translate(0,0) scale(1); }
  33% { transform:translate(40px,-40px) scale(1.08); }
  66% { transform:translate(-30px,20px) scale(.94); }
}

/* App window */
.app {
  position:relative; z-index:1;
  width: 820px; max-width:100%;
  background: var(--card);
  border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,.1), 0 0 0 1px rgba(0,0,0,.04);
  overflow: hidden;
  animation: appIn .6s var(--transition);
}
@keyframes appIn { from { opacity:0; transform:translateY(30px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }

/* Title bar */
.titlebar {
  height: 36px; background:#1e1e2e;
  display:flex; align-items:center; padding:0 14px;
  gap:8px;
}
.titlebar .dot { width:10px; height:10px; border-radius:50%; }
.titlebar .dot.r { background:#FF5F57; }
.titlebar .dot.y { background:#FFBD2E; }
.titlebar .dot.g { background:#28CA41; }
.titlebar .ttl { color:#ccc; font-size:11px; margin-left:12px; letter-spacing:.5px; }

/* Banner */
.banner {
  background: linear-gradient(135deg, var(--brand), #3B82F6, var(--brand-end));
  padding: 28px 32px; text-align:center;
  position:relative; overflow:hidden;
}
.banner::after {
  content:''; position:absolute; top:-50%; right:-20%; width:300px; height:300px;
  background:rgba(255,255,255,.04); border-radius:50%;
  animation: bannerGlow 8s ease-in-out infinite;
}
@keyframes bannerGlow {
  0%,100% { transform:translate(0,0) scale(1); }
  50% { transform:translate(-30px,20px) scale(1.2); }
}
.banner .brand { font-size:10px; letter-spacing:6px; text-transform:uppercase; color:rgba(255,255,255,.45); margin-bottom:4px; position:relative; z-index:1; }
.banner h1 { font-size:24px; font-weight:700; color:#fff; position:relative; z-index:1; letter-spacing:-.3px; }
.banner .sub { font-size:12px; color:rgba(255,255,255,.65); margin-top:4px; position:relative; z-index:1; }

/* Step badge */
.step-bar {
  background: linear-gradient(135deg, var(--brand), var(--brand-end));
  padding: 12px 28px; display:flex; align-items:center; gap:12px;
}
.step-badge {
  width:32px; height:32px; border-radius:50%;
  background:rgba(255,255,255,.2); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px;
  animation: badgePop .5s var(--transition);
}
@keyframes badgePop { from { transform:scale(0); } to { transform:scale(1); } }
.step-bar .st { color:#fff; font-weight:700; font-size:14px; }

/* Content area */
.content { padding:24px 28px; min-height:380px; }

/* Status cards */
.status-cards { display:flex; flex-direction:column; gap:10px; }
.status-card {
  display:flex; align-items:center; padding:14px 18px;
  border-radius:12px; background:#F9FAFB;
  border-left:3px solid #e5e7eb;
  transition: all .3s ease;
  animation: cardSlide .5s var(--transition) both;
}
.status-card:nth-child(1) { animation-delay:.05s; }
.status-card:nth-child(2) { animation-delay:.1s; }
.status-card:nth-child(3) { animation-delay:.15s; }
.status-card:nth-child(4) { animation-delay:.2s; }
@keyframes cardSlide { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
.status-card.ok { background:#f0fdf4; border-left-color:var(--green); }
.status-card.no { background:#fff7ed; border-left-color:var(--orange); }
.status-card .dot { width:10px; height:10px; border-radius:50%; margin-right:12px; flex-shrink:0; }
.status-card.ok .dot { background:var(--green); }
.status-card.no .dot { background:var(--orange); }
.status-card .name { font-weight:700; font-size:13px; color:var(--text); }
.status-card .ver { margin-left:auto; font-size:11px; color:var(--text2); }

/* Flow links */
.flow-links { margin-top:16px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.flow-links span { font-size:13px; font-weight:600; color:var(--text); }
.flow-links select { padding:6px 14px; border-radius:8px; border:1.5px solid #dde; font-size:13px; font-weight:600; color:var(--brand); background:#f0f4ff; outline:none; }
.flow-links .btn-retry { padding:7px 16px; border-radius:8px; background:#555; color:#fff; font-size:11px; font-weight:700; border:none; cursor:pointer; transition:all .2s ease; }
.flow-links .btn-retry:hover { background:#333; transform:scale(1.03); }

/* Option cards (API / Security) */
.option-cards { display:flex; flex-direction:column; gap:10px; }
.opt-card {
  padding:16px 18px; border-radius:12px; background:#F9FAFB;
  border:2px solid transparent; cursor:pointer;
  transition:all .25s ease;
  animation: cardSlide .4s var(--transition) both;
}
.opt-card:hover { background:#f0f4ff; border-color:#c4d9ff; transform:translateX(4px); }
.opt-card.selected { background:#EEF2FF; border-color:var(--brand); box-shadow:0 0 0 3px rgba(0,102,255,.1); }
.opt-card .radio-row { display:flex; align-items:center; gap:10px; }
.opt-card .radio-dot {
  width:20px; height:20px; border-radius:50%; border:2px solid #ccc;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all .3s ease;
}
.opt-card.selected .radio-dot { border-color:var(--brand); background:var(--brand); }
.opt-card.selected .radio-dot::after { content:''; width:8px; height:8px; border-radius:50%; background:#fff; }
.opt-card .opt-title { font-weight:700; font-size:13px; color:var(--text); }
.opt-card .opt-desc { font-size:11px; color:var(--text2); margin-top:2px; }

/* Custom model fields (progressive disclosure) */
.custom-fields {
  overflow:hidden; max-height:0; opacity:0;
  transition: max-height .5s var(--transition), opacity .4s ease, margin .4s ease;
  margin-top:0;
}
.custom-fields.show { max-height:500px; opacity:1; margin-top:16px; }
.custom-fields .field-group {
  background:#FAFBFC; border-radius:12px; padding:16px;
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
  border:1.5px solid #eef;
  animation: fadeSlideIn .4s var(--transition) both;
}
@keyframes fadeSlideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.field-group .field-label {
  font-size:11px; font-weight:600; color:var(--text); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px;
}
.field-group input {
  width:100%; padding:10px 14px; border-radius:8px; border:1.5px solid #dde;
  font-size:12px; font-family:inherit; outline:none;
  transition:border-color .2s ease, box-shadow .2s ease;
  background:#fff;
}
.field-group input:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(0,102,255,.08); }
.field-group .full { grid-column:1/-1; }

/* Section title */
.section-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin:6px 0 4px; }

/* Checkboxes */
.checks { display:flex; gap:20px; margin-top:10px; flex-wrap:wrap; }
.check-item { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:var(--text); cursor:pointer; }

/* Install button */
.install-btn {
  width:100%; padding:16px; border-radius:12px;
  background:linear-gradient(135deg, var(--green), #00D166);
  color:#fff; font-size:15px; font-weight:700; border:none; cursor:pointer;
  transition:all .3s ease;
  position:relative; overflow:hidden;
}
.install-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,184,77,.3); }
.install-btn:active { transform:translateY(0); }
.install-btn::after {
  content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
  background:linear-gradient(45deg, transparent 40%, rgba(255,255,255,.1) 50%, transparent 60%);
  animation: shimmer 3s infinite;
}
@keyframes shimmer { 0% { transform:translateX(-100%) rotate(45deg); } 100% { transform:translateX(100%) rotate(45deg); } }

/* Terminal */
.terminal {
  margin-top:16px; background:#1a1b26; border-radius:12px; padding:16px 20px;
  font-family:'Cascadia Code','Consolas',monospace; font-size:11px; color:#a9b1d6;
  min-height:200px; line-height:1.7;
  animation: termIn .5s var(--transition);
}
@keyframes termIn { from { opacity:0; transform:scaleY(.9); transform-origin:top; } to { opacity:1; transform:scaleY(1); } }
.terminal .dim { color:#565f89; }
.terminal .green { color:#9ece6a; }
.terminal .orange { color:#e0af68; }
.terminal .blue { color:#7aa2f7; }

/* Nav bar */
.navbar {
  display:flex; gap:12px; padding:16px 28px;
  background:linear-gradient(180deg, #1e1e2e, #16162a);
  align-items:center;
}
.navbar button {
  padding:9px 20px; border-radius:8px; font-weight:700; font-size:12px;
  border:none; cursor:pointer; transition:all .2s ease;
}
.btn-back { background:rgba(255,255,255,.1); color:#ccc; }
.btn-back:hover { background:rgba(255,255,255,.18); }
.btn-next { background:var(--brand); color:#fff; }
.btn-next:hover { background:#0052D9; transform:scale(1.03); }

/* Animated progress */
.progress-wrap { margin-top:12px; }
.progress-bar {
  height:6px; border-radius:6px; background:#e5e7eb; overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:6px;
  background:linear-gradient(90deg, var(--brand), var(--brand-end));
  width:0%; transition:width .4s ease;
  animation: progAnim 4s ease-in-out infinite;
}
@keyframes progAnim {
  0% { width:5%; }
  50% { width:45%; }
  100% { width:68%; }
}

/* Toggle switches */
.toggle-row { display:flex; gap:24px; margin-top:10px; align-items:center; }
.toggle-item { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:var(--text); }
.toggle {
  width:44px; height:24px; border-radius:12px; background:#dde;
  position:relative; cursor:pointer; transition:all .3s ease;
}
.toggle.on { background:var(--brand); }
.toggle::after {
  content:''; width:20px; height:20px; border-radius:50%; background:#fff;
  position:absolute; top:2px; left:2px;
  transition:all .3s ease;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.toggle.on::after { left:22px; }

/* Welcome cards */
.welcome-cards { display:flex; gap:16px; margin-top:20px; }
.welcome-card {
  flex:1; padding:24px 20px; border-radius:14px; cursor:pointer;
  transition:all .35s var(--transition);
  position:relative; overflow:hidden;
}
.welcome-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  border-radius:0 4px 4px 0;
}
.welcome-card.pro { background:linear-gradient(135deg, #EEF2FF, #F5F8FF); }
.welcome-card.pro::before { background:var(--brand); }
.welcome-card.simple { background:linear-gradient(135deg, #ECFDF5, #F5FFFA); }
.welcome-card.simple::before { background:var(--green); }
.welcome-card:hover { transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,.08); }
.welcome-card .wc-icon { font-size:28px; margin-bottom:8px; }
.welcome-card h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
.welcome-card p { font-size:11px; color:var(--text2); line-height:1.5; }
.welcome-card.pro h3 { color:var(--brand); }
.welcome-card.simple h3 { color:var(--green); }

/* Page transition */
.page { animation: pageIn .45s var(--transition); }
@keyframes pageIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* Skill pills */
.skills-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.skill-pill {
  padding:8px 14px; border-radius:20px; font-size:11px; font-weight:600;
  background:#F3F4F6; color:var(--text); cursor:pointer;
  transition:all .2s ease;
}
.skill-pill.on { background:var(--brand); color:#fff; }
.skill-pill.off { background:#f3f4f6; color:#ccc; text-decoration:line-through; cursor:default; }
.skill-pill:hover:not(.off) { transform:scale(1.05); }

/* Tabs */
.tabs { display:flex; gap:0; overflow:hidden; border-radius:10px; border:1.5px solid #eef; }
.tab {
  flex:1; text-align:center; padding:10px; font-size:12px; font-weight:700;
  cursor:pointer; transition:all .3s ease; background:#FAFBFC; color:var(--text2);
}
.tab.active { background:var(--brand); color:#fff; }
.tab:first-child { border-radius:8px 0 0 8px; }
.tab:last-child { border-radius:0 8px 8px 0; }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<div class="app" id="app">
  <!-- Title bar -->
  <div class="titlebar">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <span class="ttl">Claude Code Installer v1.0.6 — Shimizu</span>
  </div>

  <!-- Dynamic content rendered by JS -->
</div>

<script>
// ═══ Page State ═══
let currentPage = -1;
const state = {
  simple: false,
  drive: 'C:',
  selectedApi: 'anthropic', // 'anthropic' | 'deepseek' | 'custom'
  customFields: {
    apiKey: '',
    baseUrl: '',
    mainModel: '',
    opusModel: '',
    sonnetModel: '',
    haikuModel: '',
    subagentModel: '',
  },
  maxThinking: true,
  noUpdate: false,
  lang: 'zh',
};

// ═══ Render ═══
function navigate(pageIdx) {
  currentPage = pageIdx;
  const container = document.getElementById('app');
  // Keep titlebar, replace rest
  const html = renderPage(pageIdx);
  container.innerHTML = `
    <div class="titlebar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <span class="ttl">Claude Code Installer v1.0.6 — Shimizu</span>
    </div>
    ${html}
  `;
  // Re-bind events
  bindEvents();
}

function renderPage(idx) {
  switch(idx) {
    case 0: return renderWelcome();
    case 1: return renderEnv();
    case 2: return renderSkills();
    case 3: return renderTools();
    case 4: return renderSecurity();
    case 5: return renderApi();
    case 6: return renderSimpleApi();
    case 7: return renderInstall();
    default: return renderWelcome();
  }
}

// ── Page 0: Welcome ──
function renderWelcome() {
  return `
    <div class="page">
      <div class="banner">
        <div class="brand">Shimizu</div>
        <h1>Claude Code 安装器</h1>
        <div class="sub">一键安装 · 永久免费 · v1.0.6</div>
      </div>
      <div class="content">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;">选择安装方式</div>
        <div class="welcome-cards">
          <div class="welcome-card pro" onclick="navigate(1)" id="cardPro">
            <div class="wc-icon">⚙️</div>
            <h3>我是专业用户</h3>
            <p>逐步选择 Skills、工具、安全模式、API 配置</p>
          </div>
          <div class="welcome-card simple" onclick="state.simple=true;navigate(6)" id="cardSimple">
            <div class="wc-icon">🚀</div>
            <h3>我是小白用户</h3>
            <p>选择安装位置 → API 配置 → 一键安装</p>
          </div>
        </div>
        <div style="margin-top:16px;font-size:11px;color:var(--text2);">
          专业模式：完整控制安装过程 &nbsp;|&nbsp; 小白模式：简易安装 · 快速配置
        </div>
      </div>
    </div>
  `;
}

// ── Page 1: Env ──
function renderEnv() {
  const items = [
    { name:'Node.js', ok:true, ver:'v20.18.0' },
    { name:'Git', ok:true, ver:'2.45.2' },
    { name:'Python', ok:false, ver:'未安装' },
    { name:'Claude Code', ok:false, ver:'未安装' },
  ];
  let cards = '';
  items.forEach(i => {
    cards += `
      <div class="status-card ${i.ok ? 'ok' : 'no'}">
        <div class="dot"></div>
        <span class="name">${i.name}</span>
        <span class="ver">${i.ver}</span>
      </div>
    `;
  });

  return `
    <div class="page">
      <div class="step-bar">
        <div class="step-badge">1</div>
        <span class="st">环境检测</span>
      </div>
      <div class="content">
        <div class="flow-links">
          <span>语言:</span>
          <select id="langSel"><option>中文</option><option>English</option></select>
          <span style="margin-left:12px;">安装盘符:</span>
          <select id="driveSel"><option>C:</option><option>D:</option><option>F:</option></select>
          <button class="btn-retry" onclick="navigate(1)">⟳ 重新检测</button>
        </div>
        <div class="status-cards" style="margin-top:16px;">
          ${cards}
        </div>
        <div style="margin-top:12px;font-size:11px;color:var(--text2);">
          路径: Node → C:\\NodeJS &nbsp; Git → C:\\Git &nbsp; npm → C:\\npm-global
        </div>
      </div>
      ${renderNav(1)}
    </div>
  `;
}

// ── Page 2: Skills ──
function renderSkills() {
  const skills = [
    { name:'Superpowers', on:true }, { name:'Find Skills', on:true },
    { name:'Document Skills', on:true }, { name:'Frontend Design', on:true },
    { name:'Skill Creator', on:true }, { name:'Caveman', on:true },
    { name:'Web Access', on:true }, { name:'Claude-mem', on:true },
    { name:'PUA Skill', on:true }, { name:'Excalidraw', on:true },
    { name:'Code Review', on:false, disabled:true },
    { name:'Security Audit', on:false, disabled:true },
    { name:'Test Generator', on:false, disabled:true },
  ];
  let pills = '';
  skills.forEach(s => {
    pills += `<span class="skill-pill ${s.disabled ? 'off' : 'on'}">${s.name}</span>`;
  });

  return `
    <div class="page">
      <div class="step-bar">
        <div class="step-badge">2</div>
        <span class="st">Skills 选择</span>
      </div>
      <div class="content">
        <button class="btn-retry" style="background:var(--brand);margin-bottom:8px;">全选 / 取消全选</button>
        <div class="skills-list">${pills}</div>
        <div style="margin-top:8px;font-size:10px;color:var(--text2);">灰色项暂不支持自动安装</div>
      </div>
      ${renderNav(2)}
    </div>
  `;
}

// ── Page 3: Tools ──
function renderTools() {
  return `
    <div class="page">
      <div class="step-bar">
        <div class="step-badge">3</div>
        <span class="st">工具与逻辑</span>
      </div>
      <div class="content">
        <div class="check-item" style="margin-bottom:8px;">
          <input type="checkbox" checked id="chkTools"> <label for="chkTools" style="font-weight:700;font-size:13px;">安装截图操作工具 (Python)</label>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-left:24px;">scr / ocr / see / act / browser — 屏幕截图、OCR、鼠标键盘、浏览器自动化</div>
        <div class="check-item" style="margin:18px 0 8px;">
          <input type="checkbox" checked id="chkLogic"> <label for="chkLogic" style="font-weight:700;font-size:13px;">添加截图辅助逻辑 (写入 CLAUDE.md)</label>
        </div>
        <textarea style="margin-left:24px;width:calc(100%-30px);height:50px;border-radius:8px;border:1.5px solid #dde;padding:10px;font-family:Consolas,monospace;font-size:11px;resize:none;" readonly>当用户请求不清晰时，主动询问是否需要截图查看。</textarea>
      </div>
      ${renderNav(3)}
    </div>
  `;
}

// ── Page 4: Security ──
function renderSecurity() {
  return `
    <div class="page">
      <div class="step-bar">
        <div class="step-badge">4</div>
        <span class="st">安全模式</span>
      </div>
      <div class="content">
        <div class="option-cards">
          <div class="opt-card" onclick="selectOption(this)" data-val="safe">
            <div class="radio-row">
              <div class="radio-dot"></div>
              <div>
                <div class="opt-title">安全模式</div>
                <div class="opt-desc">高威胁操作需要用户确认</div>
              </div>
            </div>
          </div>

// ── Nav bar ──
function renderNav(page) {
  const showNav = page > 0;
  if (!showNav) return '';
  return `
    <div class="navbar">
      <button class="btn-back" onclick="navigate(${page - 1})">← 上一步</button>
      <button class="btn-next" onclick="navigate(${page < 7 ? page + 1 : page})">下一步 →</button>
    </div>
  `;
}

// ═══ Interactions ═══
function selectApiOption(val) {
  state.selectedApi = val;
  navigate(currentPage);
}

function selectOption(el) {
  const parent = el.parentElement;
  parent.querySelectorAll('.opt-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function bindEvents() {
  // Drives
  document.querySelectorAll('#driveSel, #driveSel2').forEach(sel => {
    sel.addEventListener('change', e => { state.drive = e.target.value; });
  });
  // Lang
  const langSel = document.getElementById('langSel');
  if (langSel) langSel.addEventListener('change', e => { state.lang = e.target.value === 'English' ? 'en' : 'zh'; });
}

// ═══ Start ═══
navigate(0);
